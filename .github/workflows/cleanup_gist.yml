name: Cleanup Old Gists
on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Delete Gists older than 1 hour
        env:
          GH_TOKEN: ${{ secrets.GIST_PAT }}
        run: |
          # 1時間前の時刻をUnixタイムに変換
          THRESHOLD=$(date -d "1 hour ago" +%s)
          echo "判定基準 (Unix): $THRESHOLD"

          # --json を使わず、テキスト出力からID(1列目)と時間(5列目)を抜き出す
          # gh gist list の出力形式: ID  Description  Files  Visibility  UpdatedAt
          gh gist list --limit 100 | while read -r ID DESC FILES VIS UPDATED; do
            # 更新日時をUnixタイムに変換
            UPDATED_TS=$(date -d "$UPDATED" +%s)
            
            echo "チェック中: $ID (更新日: $UPDATED / TS: $UPDATED_TS)"

            if [ "$UPDATED_TS" -lt "$THRESHOLD" ]; then
              echo "==> 削除します: $ID"
              gh gist delete "$ID" --yes
            else
              echo "==> スキップ: まだ1時間以内です"
            fi
          done
