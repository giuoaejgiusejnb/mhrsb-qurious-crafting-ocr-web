name: Cleanup Old Gists
on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Delete Gists older than 1 hour
        env:
          GH_TOKEN: ${{ secrets.GIST_PAT }}
        run: |
          THRESHOLD=$(date -d "1 hour ago" +%s)
          
          # 列のズレを防ぐため、1列目(ID)と最後(日付)を直接抽出
          gh gist list --limit 100 | while read -r line; do
            # IDを取得（最初の1列目）
            ID=$(echo "$line" | awk '{print $1}')
            # 更新日時を取得（最後の列）
            UPDATED=$(echo "$line" | grep -oE '[0-9]{4}-[0-9]{2}-[0-9]{2}T[0-9]{2}:[0-9]{2}:[0-9]{2}Z')
            
            if [ -n "$UPDATED" ]; then
              UPDATED_TS=$(date -d "$UPDATED" +%s)
              
              if [ "$UPDATED_TS" -lt "$THRESHOLD" ]; then
                echo "Deleting: $ID (Updated: $UPDATED)"
                gh gist delete "$ID" --yes
              fi
            fi
          done
