        run: |
          THRESHOLD=$(date -d "1 hour ago" +%s)
          echo "判定基準時刻 (Unix): $THRESHOLD"

          # 一覧が取得できているかデバッグ表示
          gh gist list --limit 10

          gh gist list --limit 1000 --json id,updatedAt | jq -c '.[]' | while read -r gist; do
            ID=$(echo $gist | jq -r '.id')
            UPDATED_AT=$(echo $gist | jq -r '.updatedAt')
            UPDATED_TS=$(date -d "$UPDATED_AT" +%s)

            echo "チェック中: $ID (更新日: $UPDATED_AT / TS: $UPDATED_TS)"

            if [ "$UPDATED_TS" -lt "$THRESHOLD" ]; then
              echo "==> 削除実行対象です: $ID"
              gh gist delete "$ID" --yes
            else
              echo "==> まだ1時間経っていないためスキップします"
            fi
          done
