name: Cleanup Old Gists
on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Delete Gists using Python
        env:
          GH_TOKEN: ${{ secrets.GIST_PAT }}
        run: |
          python3 - <<EOF
          import os
          import requests
          from datetime import datetime, timezone, timedelta

          token = os.getenv("GH_TOKEN")
          headers = {
              "Authorization": f"Bearer {token}",
              "Accept": "application/vnd.github+json"
          }
          
          # 1時間前の基準
          threshold = datetime.now(timezone.utc) - timedelta(hours=1)
          
          # Gist一覧取得
          res = requests.get("https://github.com", headers=headers)
          if res.status_code == 200:
              for gist in res.json():
                  updated_at = datetime.fromisoformat(gist["updated_at"].replace("Z", "+00:00"))
                  if updated_at < threshold:
                      gist_id = gist["id"]
                      # 削除実行
                      del_res = requests.delete(f"https://github.com{gist_id}", headers=headers)
                      if del_res.status_code == 204:
                          print(f"Deleted: {gist_id}")
          EOF
