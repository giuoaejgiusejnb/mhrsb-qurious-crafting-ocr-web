app = 'flet-app-mhrsb-ocr'
primary_region = 'nrt'
kill_signal = 'SIGINT'
kill_timeout = '10s' # 少し余裕を持たせる

[build]

[env]
  FLET_SESSION_TIMEOUT = '60'
  PYTHONPATH = "/app/src" 

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = 'connections'
    hard_limit = 25
    soft_limit = 20

  [http_service.http_options.response.headers]
    Referrer-Policy = "no-referrer-when-downgrade"

# 起動が遅いアプリ（Firebase読み込みなど）のためにチェックを緩める
[[http_service.checks]]
  grace_period = "120s"
  interval = "15s"
  method = "get"
  path = "/"
  timeout = "2s"

[[vm]]
  memory_mb = 512  # 256MBだとFirebase+Fletの起動時にメモリ不足で落ちることがあります
  cpus = 1
